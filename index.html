<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
<title>Maus-Belohnung</title>
<link rel="manifest" href="manifest.webmanifest" />
<meta name="theme-color" content="#56C2EA" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Maus" />
<link rel="apple-touch-icon" href="icon-180.png" />
<style>
  :root{ --bg:#EAF6FB; --ink:#2C3A45; --soft:#8AA0AD; --maus:#F08C00; --water:#2BA8DE;
    --pipe:#DCEAF0; --pipe2:#C6DEE9; --card:#fff; --good:#5BA152; }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent; -webkit-user-select:none; user-select:none;}
  html,body{margin:0; background:
    radial-gradient(120% 60% at 50% 0%, #FFFDF6 0%, #EAF6FB 55%, #DDF0F8 100%) fixed;
    color:var(--ink);
    font-family:'SF Pro Rounded','ui-rounded','Nunito','Segoe UI',system-ui,sans-serif;
    overscroll-behavior:none;}
  #app{max-width:440px; margin:0 auto; min-height:100vh;
    padding:calc(env(safe-area-inset-top) + 14px) 16px calc(env(safe-area-inset-bottom) + 16px);
    display:flex; flex-direction:column; align-items:center; gap:10px;}
  .topbar{width:100%; display:flex; align-items:center; justify-content:space-between;}
  .mouse{font-size:34px; cursor:pointer;}
  .pill{font-size:12px; font-weight:800; padding:6px 12px; border-radius:999px; background:#fff; color:var(--water); box-shadow:0 3px 10px #9FC9DC55; display:flex; align-items:center; gap:6px;}
  .dot{width:8px;height:8px;border-radius:999px;background:var(--water);}
  .scene{position:relative; width:100%; background:linear-gradient(180deg,#FFFFFF 0%, #F4FBFE 100%);
    border-radius:30px; box-shadow:0 14px 36px #A9CFE055, inset 0 0 0 4px #fff; padding:8px; overflow:hidden;}
  .scene svg{width:100%; height:auto; display:block;}
  .startoverlay{position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px;}
  .startbtn{border:none; width:108px; height:108px; border-radius:999px; background:var(--maus); color:#fff;
    font-size:46px; box-shadow:0 12px 28px #F08C0070; display:flex; align-items:center; justify-content:center; animation:bob 2.2s ease-in-out infinite;}
  .startbtn:active{transform:scale(.93);}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
  .startlabel{font-weight:800; font-size:18px; color:var(--ink); background:#fff; padding:8px 16px; border-radius:999px; box-shadow:0 6px 16px #A9CFE055;}
  .rewards{width:100%; display:flex; gap:12px;}
  .rw{flex:1; background:var(--card); border-radius:22px; box-shadow:0 8px 20px #A9CFE044; padding:14px;
    display:flex; flex-direction:column; align-items:center; gap:6px; border:none;}
  .rw .big{font-size:38px; line-height:1;}
  .rw .cap{font-weight:800; font-size:15px;}
  .rw.locked{opacity:.45;}
  .rw .count{position:absolute;}
  .rwwrap{position:relative; flex:1; display:flex;}
  .badge{position:absolute; top:8px; right:10px; min-width:24px; height:24px; padding:0 6px; border-radius:999px; background:var(--ente,#F6C544); color:#3B2A1A; font-weight:900; font-size:13px; display:flex; align-items:center; justify-content:center;}
  /* overlays */
  .scrim{position:fixed; inset:0; background:#0006; display:flex; align-items:flex-end; justify-content:center; padding:14px; z-index:60;}
  .sheet{width:100%; max-width:440px; max-height:90vh; overflow:auto; background:#fff; border-radius:26px; padding:20px; display:flex; flex-direction:column; gap:16px;}
  .sheet h2{margin:0; font-size:18px;}
  .step{display:flex; align-items:center; justify-content:space-between; font-size:14px; font-weight:600;}
  .stepctl{display:flex; align-items:center; gap:12px;}
  .stepbtn{width:36px;height:36px;border-radius:999px;border:1px solid #E2EEF3;background:var(--bg);font-size:18px;font-weight:800;}
  .sval{width:30px;text-align:center;font-weight:800;font-size:18px;}
  .hint{font-size:12px;color:var(--soft);}
  .srow{display:flex;gap:8px;}
  .sbtn{flex:1;border-radius:16px;padding:12px;font-weight:800;font-size:14px;border:1px solid #E2EEF3;background:var(--bg);color:var(--ink);}
  .sbtn.go{background:var(--water);color:#fff;border:none;}
  .sbtn.danger{background:#F4DADA;color:#9A3A3A;border:none;}
  /* picker */
  .pickwrap{width:100%;max-width:440px;background:#fff;border-radius:26px;padding:18px;display:flex;flex-direction:column;gap:14px;max-height:90vh;overflow:auto;}
  .back{align-self:flex-start;border:none;background:var(--bg);border-radius:999px;padding:10px 16px;font-weight:800;}
  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;}
  .vcard{position:relative;border:none;text-decoration:none;color:#fff;border-radius:20px;aspect-ratio:1.4/1;display:flex;align-items:center;justify-content:center;font-size:46px;box-shadow:0 6px 16px #A9CFE066;}
  .vbadge{position:absolute;top:8px;right:8px;background:#0003;color:#fff;font-size:11px;font-weight:800;padding:3px 7px;border-radius:999px;}
  .empty{text-align:center;color:var(--soft);font-size:14px;line-height:1.5;padding:20px;}
  small.note{color:var(--soft);font-size:12px;text-align:center;}
  .install{width:100%;background:#fff;border-radius:16px;box-shadow:0 6px 16px #A9CFE044;padding:10px 14px;font-size:13px;display:flex;gap:10px;align-items:center;}
  .install b{color:var(--maus);}
  .install button{margin-left:auto;border:none;background:var(--bg);border-radius:999px;width:26px;height:26px;font-weight:800;}
  .confetti{position:absolute;inset:0;pointer-events:none;overflow:hidden;}
  .confetti i{position:absolute;top:-14px;width:9px;height:14px;border-radius:2px;animation:fall 1.8s ease-in forwards;}
  @keyframes fall{0%{opacity:1;transform:translateY(0) rotate(0)}100%{opacity:.15;transform:translateY(520px) rotate(620deg)}}
  .swirling{transform-box:fill-box;transform-origin:center;animation:swirl 1.1s linear infinite;}
  @keyframes swirl{to{transform:rotate(360deg)}}
  .popping{animation:pop .6s cubic-bezier(.34,1.56,.64,1);}
  @keyframes pop{0%{transform:scale(.2) rotate(-15deg)}60%{transform:scale(1.2) rotate(5deg)}100%{transform:scale(1) rotate(0deg)}}
  .waterflow{filter:drop-shadow(0 0 6px #2BA8DEBB);}
  @keyframes shimmer{0%,100%{opacity:.8}50%{opacity:1}}
  .bub{animation:bubble 2s ease-in-out infinite;}
  @keyframes bubble{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-4px) scale(1.1)}}
  .confetti i.sq{border-radius:2px;}
  .confetti i.ci{border-radius:999px;width:9px;height:9px;}
  .confetti i.tr{width:0;height:0;background:none!important;border-left:5px solid transparent;border-right:5px solid transparent;border-bottom:10px solid var(--cc);}
  @keyframes fall{0%{opacity:1;transform:translateY(0) rotate(0) scale(1)}80%{opacity:.8}100%{opacity:0;transform:translateY(560px) rotate(720deg) scale(.5)}}
</style>
</head>
<body>
<div id="app">
  <div class="topbar">
    <div class="mouse" id="mouse">🐭</div>
    <span class="pill"><span class="dot"></span><span id="daypill">Tag 1</span></span>
  </div>
  <div id="installslot" style="width:100%"></div>

  <div class="scene">
    <svg id="svg" viewBox="0 0 320 600">
      <defs>
        <linearGradient id="wg" gradientUnits="userSpaceOnUse" x1="0" y1="90" x2="0" y2="540">
          <stop offset="0" stop-color="#6CCBEE"/><stop offset="1" stop-color="#1E97CC"/>
        </linearGradient>
      </defs>
      <!-- decorative mascot -->
      <text x="58" y="70" font-size="34">🐭</text>
      <!-- cistern -->
      <rect x="104" y="36" width="112" height="60" rx="16" fill="#fff" stroke="#CFE6EF" stroke-width="3"/>
      <rect x="113" y="48" width="94" height="36" rx="9" fill="#EAF7FD"/>
      <rect id="cistw" x="113" y="58" width="94" height="26" rx="6" fill="url(#wg)"/>
      <rect x="148" y="92" width="24" height="14" fill="#CFE6EF"/>
      <!-- trunk casing + water added/managed in script via these base elements -->
      <path id="trunkcase" fill="none" stroke="#CFE6EF" stroke-width="22" stroke-linecap="round"/>
      <path id="trunkcase2" fill="none" stroke="#EAF7FD" stroke-width="15" stroke-linecap="round"/>
      <g id="branchcase"></g>
      <g id="vessels"></g>
      <path id="trunk" class="wf waterflow" fill="none" stroke="url(#wg)" stroke-width="13" stroke-linecap="round" stroke-dasharray="1" stroke-dashoffset="1" pathLength="1"/>
      <path id="trunkhi" fill="none" stroke="#BDEBFF" stroke-width="4" stroke-linecap="round" stroke-dasharray="1" stroke-dashoffset="1" pathLength="1" opacity=".8"/>
      <g id="branchwater"></g>
      <circle class="bub" r="4" fill="#DFF6FF" opacity="0"/>
      <circle class="bub" r="3.4" fill="#DFF6FF" opacity="0"/>
      <circle class="bub" r="3" fill="#DFF6FF" opacity="0"/>
      <!-- toilet -->
      <rect x="124" y="486" width="64" height="22" rx="6" fill="#fff" stroke="#CFE6EF" stroke-width="3"/>
      <ellipse cx="160" cy="552" rx="80" ry="46" fill="#fff" stroke="#CFE6EF" stroke-width="4"/>
      <ellipse cx="160" cy="552" rx="56" ry="30" fill="#EAF7FD"/>
      <ellipse id="bowlw" cx="160" cy="552" rx="50" ry="26" fill="url(#wg)" opacity="0"/>
      <path id="swirl" d="M160,534 a17,17 0 1 1 -12,29" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round" opacity="0"/>
      <text id="prize" x="160" y="560" font-size="34" text-anchor="middle" opacity="0">📺</text>
    </svg>
    <div class="confetti" id="confetti"></div>
    <div class="startoverlay" id="startoverlay">
      <button class="startbtn" id="startbtn">▶</button>
      <span class="startlabel">Los!</span>
    </div>
  </div>

  <div class="rewards">
    <div class="rwwrap">
      <button class="rw" id="spotbtn"><span class="big">🎬</span><span class="cap">Spots</span></button>
      <span class="badge" id="spotbadge" style="display:none">0</span>
    </div>
    <button class="rw locked" id="storybtn"><span class="big" id="storyemoji">🔒</span><span class="cap">Geschichte</span></button>
  </div>
</div>

<script>
const $=id=>document.getElementById(id);
const NS='http://www.w3.org/2000/svg';
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
// ---- sound (synthesized, no files) ----
let AC=null;
function audioInit(){try{if(!AC)AC=new (window.AudioContext||window.webkitAudioContext)();if(AC&&AC.state==='suspended')AC.resume();}catch(e){}}
function blip(freq,dur,type,gain,when){if(!AC)return;const t=AC.currentTime+(when||0);const o=AC.createOscillator(),g=AC.createGain();o.type=type||'sine';o.frequency.setValueAtTime(freq,t);g.gain.setValueAtTime(0.0001,t);g.gain.exponentialRampToValueAtTime(gain||0.2,t+0.012);g.gain.exponentialRampToValueAtTime(0.0001,t+dur);o.connect(g).connect(AC.destination);o.start(t);o.stop(t+dur+0.03);}
function playDrop(){if(!AC)return;const t=AC.currentTime;const o=AC.createOscillator(),g=AC.createGain();o.type='sine';o.frequency.setValueAtTime(880,t);o.frequency.exponentialRampToValueAtTime(320,t+0.12);g.gain.setValueAtTime(0.22,t);g.gain.exponentialRampToValueAtTime(0.0001,t+0.18);o.connect(g).connect(AC.destination);o.start(t);o.stop(t+0.2);}
function playFinish(){[523,659,784,1047,1319].forEach((f,i)=>blip(f,0.32,'triangle',0.22,i*0.11));}
// ---- keep screen awake during a run ----
let wl=null;
async function acquireWake(){try{if('wakeLock' in navigator)wl=await navigator.wakeLock.request('screen');}catch(e){}}
function releaseWake(){try{if(wl){wl.release();wl=null;}}catch(e){}}
function svg(tag,at){const e=document.createElementNS(NS,tag);for(const k in at)e.setAttribute(k,at[k]);return e;}
function el(tag,props={},...kids){const e=document.createElement(tag);for(const k in props){if(k==='style')e.setAttribute('style',props[k]);else if(k.startsWith('on'))e.addEventListener(k.slice(2).toLowerCase(),props[k]);else if(k==='class')e.className=props[k];else if(k==='html')e.innerHTML=props[k];else e.setAttribute(k,props[k]);}for(const c of kids){if(c==null)continue;e.append(c.nodeType?c:document.createTextNode(c));}return e;}

// ---- categories (thumbnails) ----
const CAT={maus:{e:'🐭',c:'#F08C00'},technik:{e:'⚙️',c:'#7E8AA2'},tier:{e:'🐘',c:'#5AA9D6'},wasser:{e:'💧',c:'#3FA7C4'},auto:{e:'🚗',c:'#E0663B'},weltraum:{e:'🚀',c:'#5B57A6'},essen:{e:'🍎',c:'#D94F5C'},natur:{e:'🌳',c:'#5BA152'},musik:{e:'🎵',c:'#C77DB0'},koerper:{e:'🦷',c:'#E6A23C'}};
const KW=[['auto','auto'],['fahr','auto'],['zug','auto'],['tier','tier'],['elefant','tier'],['hund','tier'],['katze','tier'],['wasser','wasser'],['regen','wasser'],['meer','wasser'],['welt','weltraum'],['rakete','weltraum'],['stern','weltraum'],['mond','weltraum'],['essen','essen'],['brot','essen'],['obst','essen'],['baum','natur'],['pflanz','natur'],['wald','natur'],['musik','musik'],['lied','musik'],['zahn','koerper'],['handy','technik'],['computer','technik'],['strom','technik']];
function catOf(v){if(v.kategorie&&CAT[v.kategorie])return v.kategorie;const t=(v.titel||'').toLowerCase();for(const[k,c]of KW)if(t.includes(k))return c;return 'maus';}

// ---- date ----
const pad=n=>String(n).padStart(2,'0');
const todayStr=()=>{const d=new Date();return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());};
const parseD=s=>{const[y,m,d]=s.split('-').map(Number);return Date.UTC(y,m-1,d);};
const daysBetween=(a,b)=>Math.round((parseD(b)-parseD(a))/86400000);

// ---- state ----
const KEY='maus-water-v1';
function freshDay(){return{date:todayStr(),startedAt:null,flushed:false,spotsWatched:0,storyWatched:false,testSec:null};}
function defaultState(){return{currentDay:0,config:{cdStartMin:20,cdGrowthMin:5,branchBase:2,branchPerDays:3,branchCap:5},day:freshDay()};}
function load(){try{const s=JSON.parse(localStorage.getItem(KEY));if(!s)return defaultState();if(s.day.date!==todayStr())s.day=freshDay();if(s.currentDay==null)s.currentDay=s.modeStartDate?Math.max(0,daysBetween(s.modeStartDate,todayStr())):0;return s;}catch(e){return defaultState();}}
function save(){try{localStorage.setItem(KEY,JSON.stringify(S));}catch(e){}}
let S=load();

function dayIndex(){return S.currentDay||0;}
function targetSec(){if(S.day.testSec)return S.day.testSec;const c=S.config;return (c.cdStartMin+dayIndex()*c.cdGrowthMin)*60;}
function branchCount(){const c=S.config;return clamp(c.branchBase+Math.floor(dayIndex()/c.branchPerDays),2,c.branchCap);}
function started(){return S.day.startedAt!=null;}
function progress(){if(!started())return 0;return clamp((Date.now()-S.day.startedAt)/(targetSec()*1000),0,1);}

// ---- videos ----
let VIDEOS=[],autoStatus='laden';
async function fetchAuto(){
  const body=JSON.stringify({queries:[{fields:['topic'],query:'Sendung mit der Maus'}],sortBy:'timestamp',sortOrder:'desc',future:false,size:120});
  const r=await fetch('https://mediathekviewweb.de/api/query',{method:'POST',headers:{'Content-Type':'text/plain'},body});
  if(!r.ok)throw 0;const j=await r.json();const res=(j&&j.result&&j.result.results)||[];const out=[];
  for(const it of res){const d=it.duration;if(!d||d>420)continue;const url=it.url_website||'';if(!url)continue;out.push({titel:it.title||'Maus',dauer_s:d,url,typ:d<=150?'spot':'sachgeschichte'});}
  return out;
}
async function loadVideos(){
  let manual=[];try{const d=await(await fetch('videos.json',{cache:'no-store'})).json();manual=(d&&d.videos)||[];}catch(e){}
  let auto=null;try{auto=await fetchAuto();}catch(e){auto=null;}
  if(auto&&auto.length){const seen=new Set(manual.map(v=>v.url));VIDEOS=manual.concat(auto.filter(v=>!seen.has(v.url)));autoStatus='auto';}
  else{VIDEOS=manual;autoStatus=(auto===null)?'manuell':(manual.length?'manuell':'leer');}
}
function videosFor(kind){if(kind==='spot')return VIDEOS.filter(v=>v.typ==='spot');return VIDEOS.filter(v=>v.typ!=='spot'&&(v.dauer_s==null||v.dauer_s<=420));}

// ---- scene build ----
const TRUNK_D="M160,106 C160,140 160,150 160,168 C160,205 250,200 250,238 C250,280 70,280 70,322 C70,362 160,360 160,398 C160,432 160,452 160,484";
let trunk,trunkLen,BR=[],BUB=[],spotsEarnedNow=0,raf=0,flushVisible=false;
const VES_H=40, SPAN=0.06;

function buildScene(){
  trunk=$('trunk'); trunk.setAttribute('d',TRUNK_D);
  $('trunkcase').setAttribute('d',TRUNK_D); $('trunkcase2').setAttribute('d',TRUNK_D);
  $('trunkhi').setAttribute('d',TRUNK_D);
  trunkLen=trunk.getTotalLength();
  BUB=[...document.querySelectorAll('.bub')];
  rebuildBranches();
}
function rebuildBranches(){
  const bc=branchCount();
  $('branchcase').innerHTML=''; $('branchwater').innerHTML=''; $('vessels').innerHTML='';
  BR=[];
  const lo=0.30, hi=0.82;
  for(let i=0;i<bc;i++){
    const frac = bc===1?0.55 : lo+(hi-lo)*i/(bc-1);
    const P=trunk.getPointAtLength(frac*trunkLen);
    const side = (P.x>=160)?1:-1;            // branch away from centre toward its own side
    const vx = clamp(P.x + side*84, 36, 284);
    const vy = P.y;
    const d = `M${P.x},${P.y} Q ${P.x+side*46},${P.y} ${vx - side*0},${vy}`;
    $('branchcase').appendChild(svg('path',{d,fill:'none',stroke:'#CFE6EF','stroke-width':16,'stroke-linecap':'round'}));
    const w=svg('path',{d,fill:'none',stroke:'url(#wg)','stroke-width':9,'stroke-linecap':'round','stroke-dasharray':1,'stroke-dashoffset':1,pathLength:1}); w.setAttribute('class','wf');
    $('branchwater').appendChild(w);
    // vessel (glass)
    const gx=vx-18, gtop=vy-22, gw=36, gh=46;
    $('vessels').appendChild(svg('rect',{x:gx,y:gtop,width:gw,height:gh,rx:8,fill:'#EAF7FD',stroke:'#CFE6EF','stroke-width':2}));
    const vw=svg('rect',{x:gx+2,y:gtop+gh-2,width:gw-4,height:0,rx:5,fill:'url(#wg)'});
    $('vessels').appendChild(vw);
    const r=svg('text',{x:vx,y:gtop-8,'font-size':20,'text-anchor':'middle',fill:'#C9BBA2'}); r.textContent='🎬';
    r.style.transformBox='fill-box'; r.style.transformOrigin='center';
    $('vessels').appendChild(r);
    BR.push({frac,water:w,vw,vy0:gtop+gh-2,vfull:gh-4,reward:r,earned:false});
  }
}

function pop(node){node.classList.remove('popping');void node.getBBox();node.classList.add('popping');}

function updateScene(p){
  p=clamp(p,0,1);
  trunk.setAttribute('stroke-dashoffset',1-p);
  $('trunkhi').setAttribute('stroke-dashoffset',1-p);
  // cistern drain
  $('cistw').setAttribute('height',(26*(1-p)).toFixed(1));
  $('cistw').setAttribute('y',(58+26*p).toFixed(1));
  // bubbles near the front
  if(p>0&&p<1){BUB.forEach((b,k)=>{const lp=p-0.018*(k+1);if(lp>0.01){const pt=trunk.getPointAtLength(lp*trunkLen);b.setAttribute('cx',pt.x);b.setAttribute('cy',pt.y);b.setAttribute('opacity',0.7-0.12*k);}else b.setAttribute('opacity',0);});}
  else BUB.forEach(b=>b.setAttribute('opacity',0));
  // branches
  let earned=0;
  BR.forEach(b=>{
    const bp=clamp((p-b.frac)/SPAN,0,1);
    b.water.setAttribute('stroke-dashoffset',1-bp);
    const h=b.vfull*bp; b.vw.setAttribute('height',h.toFixed(1)); b.vw.setAttribute('y',(b.vy0-h).toFixed(1));
    const full=bp>=1; if(full)earned++;
    b.reward.setAttribute('fill',full?'#F08C00':'#C9BBA2');
    if(full&&!b.earned){b.earned=true;pop(b.reward);playDrop();}
    if(!full)b.earned=false;
  });
  // bowl
  $('bowlw').setAttribute('opacity', p>=1?0.92:(p>0.9?((p-0.9)/0.1*0.9):0));
  if(p>=1&&!flushVisible)showFlush();
  if(p<1&&flushVisible)hideFlush();
  spotsEarnedNow=earned;
  updateRewards();
}
function showFlush(){flushVisible=true;$('swirl').setAttribute('opacity',0.9);$('swirl').classList.add('swirling');$('prize').setAttribute('opacity',1);if(!S.day.flushed){S.day.flushed=true;save();}playFinish();releaseWake();burst();}
function hideFlush(){flushVisible=false;$('swirl').setAttribute('opacity',0);$('swirl').classList.remove('swirling');$('prize').setAttribute('opacity',0);}
function burst(){const c=$('confetti');c.innerHTML='';const cols=['#F08C00','#2BA8DE','#F6C544','#5BA152','#E0663B','#C77DB0','#E0663B'];const shapes=['sq','ci','tr'];for(let i=0;i<45;i++){const s=document.createElement('i');const col=cols[i%cols.length];const shape=shapes[i%shapes.length];s.className=shape;s.style.left=(4+Math.random()*92)+'%';s.style.top=(-10-Math.random()*20)+'px';if(shape==='tr'){s.style.setProperty('--cc',col);s.style.borderBottomColor=col;}else{s.style.background=col;}s.style.animationDuration=(1.4+Math.random()*0.8)+'s';s.style.animationDelay=(Math.random()*0.5)+'s';c.appendChild(s);}setTimeout(()=>{c.innerHTML='';},2800);}

function updateRewards(){
  const left=spotsEarnedNow-S.day.spotsWatched;
  const sb=$('spotbadge'); sb.style.display=left>0?'flex':'none'; sb.textContent=left;
  $('spotbtn').classList.toggle('locked',left<=0);
  const flushed=progress()>=1;
  const open=flushed&&!S.day.storyWatched;
  $('storybtn').classList.toggle('locked',!open);
  $('storyemoji').textContent=S.day.storyWatched?'✓':open?'📺':'🔒';
}

function loop(){if(!started())return;const p=progress();updateScene(p);if(p<1)raf=requestAnimationFrame(loop);}

function startCountdown(test){
  audioInit(); acquireWake();
  S.day.startedAt=Date.now(); S.day.flushed=false; S.day.testSec=test||null; save();
  $('startoverlay').style.display='none';
  flushVisible=false; hideFlush();
  loop();
}
function restartCountdown(){releaseWake();S.day.startedAt=null;S.day.flushed=false;S.day.testSec=null;S.day.spotsWatched=0;S.day.storyWatched=false;save();cancelAnimationFrame(raf);flushVisible=false;hideFlush();$('startoverlay').style.display='';updateScene(0);}

// ---- video picker (overlay) ----
function openPicker(kind,entitle){
  const wrap=el('div',{class:'pickwrap'});
  wrap.append(el('button',{class:'back',onclick:closeOverlay},'‹ zurück'));
  const list=videosFor(kind);
  if(!list.length){let m;if(autoStatus==='laden')m='Lädt Videos …';else if(autoStatus==='manuell')m='Automatisches Laden klappt nicht – der Mediathek-Server blockiert den direkten Zugriff.<br>Videos manuell in <b>videos.json</b> eintragen, oder in Phase 2 einen Proxy bauen.';else if(autoStatus==='leer')m='Gerade keine kurzen Videos gefunden.';else m='Hier gerade nichts.';wrap.append(el('div',{class:'empty',html:m}));}
  else{const grid=el('div',{class:'grid'});for(const v of list){const c=CAT[catOf(v)];const a=el('a',{class:'vcard',href:v.url,target:'_blank',rel:'noopener',style:`background:${c.c}`,onclick:()=>{consume(entitle);VIEWHOME();}},c.e);if(v.dauer_s)a.append(el('span',{class:'vbadge'},Math.round(v.dauer_s/60)+' Min'));grid.append(a);}wrap.append(grid);wrap.append(el('small',{class:'note'},(autoStatus==='auto'?'Automatisch aus der Mediathek · ':'')+'Tippen öffnet die Maus-App.'));}
  showOverlay(wrap);
}
function consume(kind){if(kind==='spot'){if(spotsEarnedNow-S.day.spotsWatched>0)S.day.spotsWatched++;}else if(kind==='story'){if(progress()>=1)S.day.storyWatched=true;}save();}
function VIEWHOME(){/* leave overlay; refresh happens on focus */}

// ---- settings (overlay, long-press) ----
function openSettings(){
  const c=S.config;
  const sheet=el('div',{class:'sheet'});
  sheet.append(el('div',{class:'topbar'},el('h2',{},'Eltern'),el('button',{class:'stepbtn',onclick:closeOverlay},'×')));
  const step=(label,key,min)=>el('div',{class:'step'},el('span',{},label),el('div',{class:'stepctl'},
    el('button',{class:'stepbtn',onclick:()=>{c[key]=Math.max(min,c[key]-1);save();refreshHome();reopen(openSettings);}},'–'),
    el('span',{class:'sval'},String(c[key])),
    el('button',{class:'stepbtn',onclick:()=>{c[key]=c[key]+1;save();refreshHome();reopen(openSettings);}},'+')));
  sheet.append(el('div',{class:'step'},el('span',{},'Tag'),el('div',{class:'stepctl'},
    el('button',{class:'stepbtn',onclick:()=>{S.currentDay=Math.max(0,(S.currentDay||0)-1);save();rebuildBranches();refreshHome();reopen(openSettings);}},'–'),
    el('span',{class:'sval'},String((S.currentDay||0)+1)),
    el('button',{class:'stepbtn',onclick:()=>{S.currentDay=(S.currentDay||0)+1;save();rebuildBranches();refreshHome();reopen(openSettings);}},'+')))
  );
  sheet.append(step('1. Tag: Minuten','cdStartMin',1));
  sheet.append(step('Pro Tag mehr Min','cdGrowthMin',0));
  sheet.append(el('p',{class:'hint'},'Heute: '+Math.round(targetSec()/60)+' Min trocken bleiben, '+branchCount()+' Abzweigungen.'));
  sheet.append(el('div',{class:'srow'},
    el('button',{class:'sbtn go',onclick:()=>{closeOverlay();restartCountdown();startCountdown(30);}},'Test (30 Sek)'),
    el('button',{class:'sbtn',onclick:()=>{closeOverlay();restartCountdown();}},'Countdown neu')));
  sheet.append(el('button',{class:'sbtn danger',onclick:()=>{S=defaultState();save();closeOverlay();fullReset();}},'Alles zurücksetzen'));
  showOverlay(el('div',{class:'scrim',onclick:e=>{if(e.target.classList.contains('scrim'))closeOverlay();}},sheet));
}
function reopen(fn){closeOverlay();fn();}

// ---- overlay plumbing ----
let overlayEl=null;
function showOverlay(node){closeOverlay();overlayEl=node.classList&&node.classList.contains('scrim')?node:el('div',{class:'scrim',onclick:e=>{if(e.target===overlayEl)closeOverlay();}},node);document.body.appendChild(overlayEl);}
function closeOverlay(){if(overlayEl){overlayEl.remove();overlayEl=null;}refreshHome();}

// ---- home refresh / wiring ----
function refreshHome(){$('daypill').textContent='Tag '+(dayIndex()+1);updateScene(progress());}
function fullReset(){cancelAnimationFrame(raf);flushVisible=false;hideFlush();rebuildBranches();$('startoverlay').style.display='';updateScene(0);}

let pressTimer=null;
(function wire(){
  const m=$('mouse');
  const startP=()=>{pressTimer=setTimeout(openSettings,700);};
  const endP=()=>{if(pressTimer)clearTimeout(pressTimer);};
  m.addEventListener('touchstart',startP,{passive:true});m.addEventListener('mousedown',startP);
  ['touchend','touchcancel','mouseup','mouseleave'].forEach(ev=>m.addEventListener(ev,endP));
  m.addEventListener('contextmenu',e=>e.preventDefault());
  $('startbtn').onclick=()=>startCountdown();
  $('spotbtn').onclick=()=>{if(spotsEarnedNow-S.day.spotsWatched>0)openPicker('spot','spot');};
  $('storybtn').onclick=()=>{if(progress()>=1&&!S.day.storyWatched)openPicker('story','story');};
})();

// install hint
function isiOS(){return /iphone|ipad|ipod/i.test(navigator.userAgent);}
function standalone(){return window.matchMedia('(display-mode: standalone)').matches||navigator.standalone===true;}
if(isiOS()&&!standalone()){$('installslot').appendChild(el('div',{class:'install'},el('span',{},'📲'),el('span',{html:'Installieren: <b>Teilen</b> → <b>Zum Home-Bildschirm</b>'}),el('button',{onclick:e=>e.target.closest('.install').remove()},'×')));}

window.addEventListener('focus',()=>{if(S.day.date!==todayStr()){S.day=freshDay();save();fullReset();}refreshHome();if(started()&&progress()<1){acquireWake();loop();}else releaseWake();});
document.addEventListener('visibilitychange',()=>{if(!document.hidden){refreshHome();if(started()&&progress()<1){acquireWake();loop();}}else releaseWake();});
if('serviceWorker' in navigator)window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));

// ---- init ----
buildScene();
$('daypill').textContent='Tag '+(dayIndex()+1);
if(started())$('startoverlay').style.display='none';
updateScene(progress());
if(started()&&progress()<1)loop();
loadVideos().then(()=>updateRewards());
</script>
</body>
</html>
